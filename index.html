<!DOCTYPE html>
<html lan="en">
   <head>
     <meta charset="utf-8">
     <Title>Resqnet Subscription</Title>
   </head>
   <body>
    <header>
        <h1>Complete Registration & Checkout Form</h1>
    </header>
    <main>
      <form>  
       <fieldset>
          <legend id="acc-info">Account Information</legend>
          <label for="name">Full-Name</label>
          <input type="text" id="name" required><br><br>
          <label for="email">Email</label>
          <input type="email" id="email" required><br><br>
          <label for="password">Password</label>
          <input type="password" id="password" required><br><br>
          <label for="confirm-password">Confirm-Password</label>
          <input type="password" id="confirm-password" required><br><br>
       </fieldset>
       <br>
        <fieldset>
         <legend id="Contact-info">Contact Information</legend>
         <label for="Phone">Phone Number</label>
         <input type="tel" id="phone" pattern="[0-9] {10}" required><br><br>
         <label for="company">Company</label>
         <input type="text" id="company"><br><br>
         <label for="web">Website</label>
         <input type="text" id="web"><br><br>
        </fieldset>
        <br>
        <fieldset>
         <legend id="bill">Billing Information</legend>
         <label for="bill-name">Billing Name</label>
         <input type="text" id="bill-name" required><br><br>
         <label for="email2">Email</label>
         <input type="email" id="email2" required><br><br>
         <label for="address1">Address Line 1</label>
         <input type="text" id="address2" required><br><br>
         <label for="City">City</label>
         <input type="text" id="city" required><br><br>
         <label for="state">State</label>
         <input type="text" id="state"><br><br>
         <label for="Postal">Postal Code</label>
         <input type="text" id="postal" inputmode="numeric" required><br><br>
         <label for="country">Country</label>
         <select id="country" required>
            <option value="">--Select Country--</option>
            <option value="usa">United States</option>
            <option value="canada">Canada</option>
            <option value="uk">United Kingdom</option>
            <option value="australia">Australia</option>
            <option value="india">India</option>
         </select><br><br>
         <label for="address2">Address Line 2</label>
         <input type="text" id="address2"><br><br>
        </fieldset>
        <br>
        <fieldset>
          <legend id="payinfo">Payment Information</legend>
          <label for="cardname">Card Holder Name </label>
          <input type="text" id="cardname" required><br><br>
          <label for="cardno">Card Number</label>
          <input type="password" id="cardno" inputmode="numeric" pattern="[0-9] {16}" placeholder="Enter a 16 digit card number" size="25" maxlength="16" required ><br><br>
          <label for="expiry">Expiry Date</label>
          <input type="month" id="expiry" required><br><br>
          <label for="cvv">CVV</label>
          <input type="password" id="cvv" inputmode="numeric" pattern="[0-9]{3,4}" maxlength="4" placeholder="Enter a 3 or 4 digit CVV" size="25" required><br><br>
        </fieldset>
    </form>








    </main>
   </body>





















</html>
